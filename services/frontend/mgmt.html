<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Inventory | Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Order Inventory System</p>
        <h1>Management</h1>
        <p class="page-subtitle">Update prices and stock levels with the admin panel.</p>
      </div>

      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="index.html">Products</a>
        <a class="nav-link" href="orders.html">Orders</a>
        <a class="nav-link active" href="mgmt.html">Management</a>
      </nav>
    </header>

    <main class="page-content">
      <section id="login" class="panel panel-narrow">
        <div class="panel-header">
          <div>
            <p class="card-label">Admin access</p>
            <h2>Sign in</h2>
          </div>
        </div>

        <div class="form-grid">
          <div class="field-group">
            <label for="username">Username</label>
            <input id="username" class="input input-wide" placeholder="Enter username" />
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input id="password" class="input input-wide" type="password" placeholder="Enter password" />
          </div>
        </div>

        <div class="panel-actions">
          <button id="login-button" class="btn btn-primary" type="button">Login</button>
        </div>

        <div id="login-message" class="alert" aria-live="polite"></div>
      </section>

      <section id="admin" class="panel" style="display: none;">
        <div class="toolbar">
          <div class="toolbar-copy">
            <h2>Inventory management</h2>
            <p>Update product price and stock, then save changes instantly.</p>
          </div>

          <button id="refresh-admin-products" class="btn btn-secondary" type="button">
            Refresh
          </button>
        </div>

        <div id="admin-message" class="alert" aria-live="polite"></div>
        <div id="admin-products" class="card-grid"></div>
      </section>
    </main>
  </div>

  <script src="shared.js"></script>
  <script src="mgmt.js"></script>
</body>
</html>
