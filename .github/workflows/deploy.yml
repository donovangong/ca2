name: CA2 Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare kubeconfig
        run: |
          cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml

      - name: Clean Kubernetes resources
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl delete namespace ca2 || true
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl wait --for=delete namespace/ca2 --timeout=60s || true

      - name: Clean k3s images
        run: |
          /usr/local/bin/k3s ctr images rm docker.io/library/ca2-frontend:latest || true
          /usr/local/bin/k3s ctr images rm docker.io/library/ca2-product-service:latest || true
          /usr/local/bin/k3s ctr images rm docker.io/library/ca2-order-service:latest || true

      - name: Clean Docker images and cache
        run: |
          docker rmi ca2-frontend:latest || true
          docker rmi ca2-product-service:latest || true
          docker rmi ca2-order-service:latest || true
          docker builder prune -af || true

      - name: Build Docker images
        run: |
          docker build --no-cache -t ca2-frontend:latest ./services/frontend
          docker build --no-cache -t ca2-product-service:latest ./services/product-service
          docker build --no-cache -t ca2-order-service:latest ./services/order-service

      - name: Import images into k3s
        run: |
          docker save ca2-frontend:latest | /usr/local/bin/k3s ctr images import -
          docker save ca2-product-service:latest | /usr/local/bin/k3s ctr images import -
          docker save ca2-order-service:latest | /usr/local/bin/k3s ctr images import -

      - name: Deploy with Helm
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install ca2 ./resources/helm/ca2 -n ca2 --create-namespace
