name: 1_Test_Env_Deploy

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      image_tag:
        description: Image tag built by the test deployment workflow
        value: ${{ jobs.build.outputs.image_tag }}

env:
  DOCKER_BUILDKIT: 1

jobs:
  build:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.image_tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Trivy scan full project
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Set image tag
        id: image_tag
        run: echo "image_tag=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Build Docker images
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.image_tag }}
        run: |
          docker build -t ca2-frontend:$IMAGE_TAG -t ca2-frontend:latest ./services/frontend
          docker build -t ca2-product-service:$IMAGE_TAG -t ca2-product-service:latest ./services/product-service
          docker build -t ca2-order-service:$IMAGE_TAG -t ca2-order-service:latest ./services/order-service

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ca2-frontend:${{ steps.image_tag.outputs.image_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Trivy scan product service image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ca2-product-service:${{ steps.image_tag.outputs.image_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Trivy scan order service image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ca2-order-service:${{ steps.image_tag.outputs.image_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Import images into k3s
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.image_tag }}
        run: |
          docker save ca2-frontend:$IMAGE_TAG | /usr/local/bin/k3s ctr images import -
          docker save ca2-product-service:$IMAGE_TAG | /usr/local/bin/k3s ctr images import -
          docker save ca2-order-service:$IMAGE_TAG | /usr/local/bin/k3s ctr images import -

      - name: Prepare kubeconfig
        run: |
          cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml

      - name: Install KEDA
        run: |
          if ! KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm status keda -n keda >/dev/null 2>&1; then
            KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo add kedacore https://kedacore.github.io/charts --force-update
            KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo update
            KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install keda kedacore/keda -n keda --create-namespace
          fi
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n keda rollout status deployment/keda-operator --timeout=120s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n keda rollout status deployment/keda-operator-metrics-apiserver --timeout=120s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n keda rollout status deployment/keda-admission-webhooks --timeout=120s

      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.image_tag }}
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install ca2 ./resources/helm/ca2 -n ca2 --create-namespace --atomic --cleanup-on-fail --timeout=180s --set-string images.frontend=ca2-frontend:$IMAGE_TAG --set-string images.productService=ca2-product-service:$IMAGE_TAG --set-string images.orderService=ca2-order-service:$IMAGE_TAG
          echo "HELM_DEPLOYED=true" >> "$GITHUB_ENV"

      - name: Restart application deployments
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout restart deployment/frontend deployment/product-service deployment/order-service

      - name: Wait for application rollout
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout status deployment/postgres --timeout=180s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout status deployment/product-service --timeout=180s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout status deployment/order-service --timeout=180s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout status deployment/frontend --timeout=180s

      - name: Rollback test deployment on failure
        if: failure() && env.HELM_DEPLOYED == 'true'
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm rollback ca2 -n ca2 || true
          for deployment in postgres product-service order-service frontend; do
            KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout status deployment/$deployment --timeout=180s || true
          done
