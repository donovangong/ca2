name: 2_API_Test

on:
  workflow_dispatch:
  workflow_call:

jobs:
  api_test:
    runs-on: self-hosted
    env:
      PRODUCT_SERVICE_LOCAL_PORT: ${{ vars.PRODUCT_SERVICE_LOCAL_PORT || '3001' }}
      ORDER_SERVICE_LOCAL_PORT: ${{ vars.ORDER_SERVICE_LOCAL_PORT || '3002' }}
      FRONTEND_LOCAL_PORT: ${{ vars.FRONTEND_LOCAL_PORT || '8080' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            test/package.json
            services/product-service/package.json
            services/order-service/package.json

      - name: Install coverage tools and service dependencies
        run: |
          npm --prefix test install
          npm --prefix test run install:services

      - name: Prepare kubeconfig
        run: |
          cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml

      - name: Start local service tunnels
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 port-forward svc/product-service "$PRODUCT_SERVICE_LOCAL_PORT:3001" > product-service-port-forward.log 2>&1 &
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 port-forward svc/order-service "$ORDER_SERVICE_LOCAL_PORT:3002" > order-service-port-forward.log 2>&1 &
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 port-forward svc/frontend "$FRONTEND_LOCAL_PORT:80" > frontend-port-forward.log 2>&1 &

      - name: Wait for services
        env:
          PRODUCT_SERVICE_URL: http://127.0.0.1:${{ env.PRODUCT_SERVICE_LOCAL_PORT }}
          ORDER_SERVICE_URL: http://127.0.0.1:${{ env.ORDER_SERVICE_LOCAL_PORT }}
          FRONTEND_URL: http://127.0.0.1:${{ env.FRONTEND_LOCAL_PORT }}
        run: node test/helpers/wait-for-services.js

      - name: Run API coverage tests
        run: |
          npx --prefix test c8 --reporter=lcov --reporter=text --report-dir coverage/api --include "services/product-service/**/*.js" --include "services/order-service/**/*.js" --exclude "**/server.js" node test/api/run-api-coverage-tests.js

      - name: Run API tests
        env:
          PRODUCT_SERVICE_URL: http://127.0.0.1:${{ env.PRODUCT_SERVICE_LOCAL_PORT }}
          ORDER_SERVICE_URL: http://127.0.0.1:${{ env.ORDER_SERVICE_LOCAL_PORT }}
          FRONTEND_URL: http://127.0.0.1:${{ env.FRONTEND_LOCAL_PORT }}
        run: node test/api/run-api-tests.js

      - name: Upload API coverage
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage
          path: coverage/api/lcov.info
