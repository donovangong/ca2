name: 4_Monitor_Grafana

on:
  workflow_dispatch:
  workflow_call:

jobs:
  monitor_grafana:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare kubeconfig
        run: |
          cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml

      - name: Apply Grafana dashboard ConfigMap
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl create namespace monitoring --dry-run=client -o yaml | KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl apply -f -
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n monitoring create configmap ca2-grafana-dashboard --from-file=ca2-dashboard.json=resources/grafana/dashboards/ca2-dashboard.json --dry-run=client -o yaml | KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl apply -f -

      - name: Install Loki and Promtail
        run: |
          retry() {
            local attempt=1
            local max_attempts=3
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 20
            done
          }

          if ! KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm status loki -n monitoring >/dev/null 2>&1; then
            retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo add grafana https://grafana.github.io/helm-charts --force-update
            retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo update
          fi
          retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install loki grafana/loki-stack -n monitoring --create-namespace -f resources/helm/loki-values.yaml

      - name: Wait for log collectors
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n monitoring rollout status statefulset/loki --timeout=180s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n monitoring rollout status daemonset/loki-promtail --timeout=180s

      - name: Install Prometheus and Grafana
        run: |
          retry() {
            local attempt=1
            local max_attempts=3
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 20
            done
          }

          if ! KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm status monitoring -n monitoring >/dev/null 2>&1; then
            retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
            retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo update
          fi
          retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install monitoring prometheus-community/kube-prometheus-stack --version 83.6.0 -n monitoring --create-namespace -f resources/helm/monitoring-values.yaml

      - name: Wait for Grafana rollout
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n monitoring rollout status deployment/monitoring-grafana --timeout=180s
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n monitoring rollout status deployment/monitoring-kube-prometheus-operator --timeout=180s

      - name: Expose Grafana with NodePort
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n monitoring patch svc monitoring-grafana --type merge -p '{"spec":{"type":"NodePort","ports":[{"name":"http-web","port":80,"protocol":"TCP","targetPort":3000,"nodePort":30300}]}}'
