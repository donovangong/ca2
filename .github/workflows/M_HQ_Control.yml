name: M_HQ_Control

on:
  #push:
  #  branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
    build_deploy:
        name: 1_Test_Env_Deploy
        uses: ./.github/workflows/1_Test_Env_Deploy.yml
        secrets: inherit

    functional_test:
        name: 2_Functional_Test
        uses: ./.github/workflows/2_Functional_Test.yml
        needs: build_deploy
        secrets: inherit

    api_test:
        name: 2_API_Test
        uses: ./.github/workflows/2_API_Test.yml
        needs: build_deploy
        secrets: inherit

    integration_test:
        name: 2_Integration_Test
        uses: ./.github/workflows/2_Integration_Test.yml
        needs: build_deploy
        secrets: inherit

    trivy_project_scan:
        name: 2_Trivy_Project_Scan
        uses: ./.github/workflows/2_Trivy_Project_Scan.yml
        needs: build_deploy
        secrets: inherit

    sonarqube:
        name: 3_SonarQube
        uses: ./.github/workflows/3_SonarQube.yml
        needs:
          - functional_test
          - api_test
          - integration_test
          - trivy_project_scan
        secrets: inherit

    dependency_check:
        name: 3_Dependency_Check
        uses: ./.github/workflows/3_Dependency_Check.yml
        needs:
          - functional_test
          - api_test
          - integration_test
          - trivy_project_scan
        secrets: inherit

    monitor_grafana:
        name: 4_Monitor_Grafana
        uses: ./.github/workflows/4_Monitor_Grafana.yml
        needs:
          - sonarqube
          - dependency_check
        secrets: inherit

    monitor_falco:
        name: 4_Monitor_Falco
        uses: ./.github/workflows/4_Monitor_Falco.yml
        needs:
          - sonarqube
          - dependency_check
        secrets: inherit

    pro_env_deploy:
        name: 5_Pro_Env_Deploy
        uses: ./.github/workflows/5_Pro_Env_Deploy.yml
        needs:
          - build_deploy
          - monitor_grafana
          - monitor_falco
        with:
          image_tag: ${{ needs.build_deploy.outputs.image_tag }}
        secrets: inherit

    rollback_test_env:
        name: Rollback_Test_Env
        runs-on: self-hosted
        needs:
          - build_deploy
          - functional_test
          - api_test
          - integration_test
          - sonarqube
          - dependency_check
          - trivy_project_scan
        if: always() && needs.build_deploy.result == 'success' && contains(needs.*.result, 'failure')
        steps:
          - name: Prepare kubeconfig
            run: |
              cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
              chmod 600 $RUNNER_TEMP/k3s.yaml

          - name: Rollback Helm release
            run: |
              KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm rollback ca2 -n ca2 || true
              for deployment in postgres product-service order-service frontend; do
                KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 rollout status deployment/$deployment --timeout=180s || true
              done
    
