name: R_Recovery_Database

on:
  workflow_dispatch:

jobs:
  recovery_database:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare kubeconfig
        run: |
          cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml

      - name: Validate backup file
        run: |
          test -s resources/backup/latest-backup.sql
          if grep -q "Place a PostgreSQL backup dump here" resources/backup/latest-backup.sql; then
            echo "resources/backup/latest-backup.sql still contains the placeholder backup."
            exit 1
          fi

      - name: Restore database
        run: |
          POSTGRES_POD=$(KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 get pod -l app=postgres -o jsonpath='{.items[0].metadata.name}')
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n ca2 exec -i "$POSTGRES_POD" -- psql -U postgres -d orders_db < resources/backup/latest-backup.sql
